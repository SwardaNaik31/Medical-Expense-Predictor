<!DOCTYPE html>
<html>
<head>
    <title>Medical Expense Predictor</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">

        <h2 class="text-center mb-4">Medical Expense Predictor 💊</h2>

        <form action="/predict" method="post">

            <div class="mb-3">
                <input type="number" name="age" class="form-control" placeholder="Age" required>
            </div>

            <div class="mb-3">
                <select name="sex" class="form-control">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="mb-3">
                <input type="number" step="0.1" name="bmi" class="form-control" placeholder="BMI" required>
            </div>

            <div class="mb-3">
                <input type="number" name="children" class="form-control" placeholder="Children" required>
            </div>

            <div class="mb-3">
                <select name="smoker" class="form-control">
                    <option value="yes">Smoker</option>
                    <option value="no">Non-Smoker</option>
                </select>
            </div>

            <div class="mb-3">
                <select name="region" class="form-control">
                    <option value="northeast">Northeast</option>
                    <option value="northwest">Northwest</option>
                    <option value="southeast">Southeast</option>
                    <option value="southwest">Southwest</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Predict</button>

        </form>

        <!-- RESULT DISPLAY -->
        {% if prediction_text %}
        <div class="alert alert-success mt-4 text-center">
            <h4>{{ prediction_text }}</h4>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
